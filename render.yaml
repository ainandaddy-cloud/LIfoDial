##############################################################################
# Lifodial — Render.com deployment configuration
# https://render.com/docs/yaml-spec
#
# Services:
#   1. lifodial-api  — FastAPI backend (Python web service)
#
# Usage:
#   1. Push this file to the root of your repo.
#   2. In the Render dashboard: New → Blueprint → select your repo.
#   3. Fill in the required secret env vars in the Render dashboard.
##############################################################################

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: lifodial-api
    runtime: python
    region: singapore          # closest to India / Middle East
    plan: starter              # upgrade to standard when load grows
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2 --loop uvloop
    healthCheckPath: /health

    envVars:
      # ── Runtime ─────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      - key: PORT
        value: "8001"

      # ── Database (Postgres on Render or Supabase) ────────────────────────────
      # Set this in the Render dashboard → Environment → Secret
      - key: DATABASE_URL
        sync: false            # mark secret — set in dashboard

      # ── AI API Keys ──────────────────────────────────────────────────────────
      - key: SARVAM_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: ELEVENLABS_API_KEY
        sync: false

      # ── App secrets ──────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates on first deploy

      - key: ENCRYPTION_KEY
        sync: false            # 32-byte base64 key — set in dashboard

      # ── CORS: allow your Vercel frontend domain ───────────────────────────────
      - key: CORS_ORIGIN
        value: https://app.lifodial.com   # update to your real Vercel URL

      # ── Uvicorn / Sentry (optional) ──────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

    # Render will set up a free TLS cert automatically
    # Custom domain: add in Render dashboard → Custom Domains
