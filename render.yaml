##############################################################################
# Lifodial — Render.com deployment configuration (Force Deploy 1)
# https://render.com/docs/yaml-spec
#
# Services:
#   1. lifodial-api  — FastAPI backend (Python web service)
#
# Usage:
#   1. Push this file to the root of your repo.
#   2. In the Render dashboard: New → Blueprint → select your repo.
#   3. Fill in the required secret env vars in the Render dashboard.
##############################################################################

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: lifodial-api
    runtime: python
    region: singapore          # closest to India / Middle East
    plan: starter              # upgrade to standard when load grows
    # rootDir intentionally NOT set — run from repo root so requirements.txt is found
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health

    envVars:
      # ── Runtime ─────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      - key: PORT
        value: "10000"        # Render uses 10000 by default for web services

      # ── Database — set this in Render dashboard (Supabase PostgreSQL URL) ────
      - key: DATABASE_URL
        sync: false           # mark secret — paste postgresql://... in dashboard

      # ── AI API Keys — set in Render dashboard ────────────────────────────────
      - key: SARVAM_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: ELEVENLABS_API_KEY
        sync: false

      # ── App secrets ──────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates on first deploy

      - key: ENCRYPTION_KEY
        sync: false           # 32-byte base64 key — set in dashboard (optional)

      # ── CORS: MUST match your Vercel frontend domain exactly ─────────────────
      # Example: https://lifodial.vercel.app  OR  https://app.lifodial.com
      - key: CORS_ORIGIN
        sync: false           # set this manually in Render → Environment

      # ── Sentry (optional) ────────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

    # Render provides free TLS automatically
    # Add a custom domain: Render dashboard → Custom Domains

